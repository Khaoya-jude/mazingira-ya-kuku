{% extends "base/base.html" %}
{% block title %}Login — Mazingira ya Kuku{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <h2 class="fw-bold mb-1">Welcome back</h2>
          <p class="text-muted mb-4">Login to your farm account</p>
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>
              <input type="text" name="username" class="form-control" autofocus required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100 py-2">Login</button>
          </form>
          <p class="text-center mt-3 mb-0 small">New farmer? <a href="{% url 'accounts:register' %}">Join free</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
