{% extends "base/base.html" %}
{% block title %}List My Eggs{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h2 class="fw-bold mb-1">List your eggs for sale</h2>
      <p class="text-muted mb-4">Buyers — hotels, schools, retailers — will see your listing and contact you directly.</p>
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Grade</label>
              <select name="grade" class="form-select" required>
                {% for val, label in grade_choices %}<option value="{{ val }}">{{ label }}</option>{% endfor %}
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Trays available (30 eggs/tray)</label>
              <input type="number" name="quantity_trays" class="form-control" min="1" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Price per tray (KES)</label>
              <input type="number" name="price_per_tray" class="form-control" step="0.01" required>
            </div>
            <div class="row g-2 mb-3">
              <div class="col-6">
                <label class="form-label fw-semibold">Available from</label>
                <input type="date" name="available_from" class="form-control" required>
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold">Available until</label>
                <input type="date" name="available_until" class="form-control" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Pickup location</label>
              <input type="text" name="pickup_location" class="form-control" placeholder="e.g. Dagoretti market, near Total" required>
            </div>
            <div class="mb-3 form-check">
              <input type="checkbox" name="delivery_available" class="form-check-input" id="delivery">
              <label class="form-check-label" for="delivery">I can deliver</label>
            </div>
            <button type="submit" class="btn btn-success w-100 py-2">Post listing</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
